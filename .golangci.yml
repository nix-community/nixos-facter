version: "2"

linters:
    default: all
    disable:
        - cyclop
        - err113
        - depguard
        - exhaustruct
        - funlen
        - godox
        - godot
        - mnd
        - varnamelen
        - forbidigo
        - tagliatelle
        - nlreturn
        - gochecknoglobals
        - wsl
        - gomodguard
        - noinlineerr

    settings:
        cyclop:
            max-complexity: 15
        wsl_v5:
            allow-first-in-block: true
            allow-whole-block: false
            branch-max-lines: 2
        revive:
            rules:
                - name: "exported"
                  disabled: true

    exclusions:
        rules:
            # repeated literals in tests are fixture data, not magic constants
            - path: _test\.go
              linters:
                  - goconst
